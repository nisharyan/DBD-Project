{% extends 'main.html' %}
{% load static %}

{% block content %}
<head>
<meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=Nunito&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=Nunito&family=Source+Serif+4&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'style.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/brands.min.css" integrity="sha512-G/T7HQJXSeNV7mKMXeJKlYNJ0jrs8RsWzYG7rVACye+qrcUhEAYKYzaa+VFy6eFzM2+/JT1Q+eqBbZFSHmJQew==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <title>Add Resource</title>
</head>


<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
    <div class="card text-white bg-dark col-md-6 offset-md-3 mt-5 p-5">
        <h1 class="h2 mb-4">Enter Equipment details</h1>
    <div>
        <form method = "POST" action="">
                {% csrf_token %}

                <div class="mt-4">
                    <label class="col-form-label">ResourceID</label>
                    {{form.resourceID}}
                </div>

                <div class="mt-4">
                    <label class="col-form-label">Equipment Type</label>   
                    {{form.equipType}}
                </div>

                <div class="mt-4">
                    <label class="col-form-label">Added Date</label>
                    {{form.addedDate}}
                </div>

                <div class="mt-4">
                    <label class="col-form-label">Department</label>
                    {{form.dept}}
                </div>

                <div class="mt-4">
                    <label class="col-form-label">General Description</label>
                    {{form.gDescr}}
                </div>

                <div class="mt-4">
                    <label class="col-form-label">Specific Description</label>
                    {{form.sDescr}}
                </div>
        
                <input type="submit" value="Submit" />
        </form>
    </div>
    </div>
</main>
{% endblock %}
